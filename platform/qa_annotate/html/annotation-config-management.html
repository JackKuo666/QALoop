<!-- 标注配置管理内容页独立页面 -->
<div id="annotationConfigManagementContent">
    <div class="section-header">
        <h2 data-i18n="nav.annotationConfig">标注配置管理</h2>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary" id="showConfigUsageBtn"><span data-i18n="actions.usageGuide">使用说明</span></button>
            <button class="btn btn-primary" id="addConfigBtn"><span data-i18n="actions.add">添加配置</span></button>
        </div>
    </div>
    <div class="section-content">
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th data-i18n="common.id">ID</th>
                        <th data-i18n="common.name">名称</th>
                        <th data-i18n="project.type">类型</th>
                        <th data-i18n="common.description">描述</th>
                        <th data-i18n="project.required">必填</th>
                        <th data-i18n="config.relatedDatasets">关联数据集</th>
                        <th data-i18n="common.createdAt">创建时间</th>
                        <th data-i18n="common.operation">操作</th>
                    </tr>
                </thead>
                <tbody id="configsTableBody">
                    <tr>
                        <td colspan="8" class="loading" data-i18n="common.loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-container" id="configsPaginationContainer" style="display: none;">
            <div class="pagination-info" id="configsPaginationInfo"></div>
            <div class="pagination-controls">
                <button class="btn btn-sm btn-secondary" id="configsPrevPage"><span data-i18n="pagination.previous">上一页</span></button>
                <span id="configsPageNumbers" style="display: flex; gap: 4px;"></span>
                <button class="btn btn-sm btn-secondary" id="configsNextPage"><span data-i18n="pagination.next">下一页</span></button>
                <select id="configsPageSize" class="form-control" data-i18n-title="pagination.itemsPerPage" style="width: auto; padding: 6px 12px; margin-left: 8px;">
                    <option value="10" data-i18n="pagination.tenPerPage">10条/页</option>
                    <option value="20" selected data-i18n="pagination.twentyPerPage">20条/页</option>
                    <option value="50" data-i18n="pagination.fiftyPerPage">50条/页</option>
                    <option value="100" data-i18n="pagination.hundredPerPage">100条/页</option>
                </select>
            </div>
        </div>
    </div>
</div>
